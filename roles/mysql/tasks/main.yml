- name: install mysql-server
  ansible.builtin.dnf:
    name: mysql-server
    state: present

- name: start and enable mysql
  ansible.builtin.service:
    name: mysqld
    enabled: yes
    state: restarted

- name: setup password
  ansible.builtin.command: mysql_secure_installation --set-root-pass  "{{ MY_SQL_PASSWORD }}" 