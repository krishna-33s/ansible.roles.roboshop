- name: appsetup
  ansible.builtin.import_role:
    name: common
    tasks_from: appsetup.yml


- name: nodejs setup 
  ansible.builtin.import_role:
    name: common
    tasks_from: nodejs-setup.yml

- name: system services
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd.yml

- name: start user
  ansible.builtin.service:
    name: user
    enabled: yes
    state: restarted   